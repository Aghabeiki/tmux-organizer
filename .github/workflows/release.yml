name: Release

on:
  push:
    tags: ["v*"]

# Needed for softprops/action-gh-release to create the GitHub release.
permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
          # Cross-compiled on the Apple-Silicon runner (plentiful) instead of a
          # scarce macos-13 Intel runner; arm64 macOS builds x86_64 out of the box.
          - target: x86_64-apple-darwin
            runner: macos-latest
          - target: aarch64-apple-darwin
            runner: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package
        # Version-less asset name so the plugin can use the stable
        # releases/latest/download/<asset> URL with no API token.
        run: |
          tar -czf "tmux-organizer-${{ matrix.target }}.tar.gz" \
            -C "target/${{ matrix.target }}/release" tmux-organizer \
            -C "$GITHUB_WORKSPACE" README.md

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: tmux-organizer-${{ matrix.target }}
          path: tmux-organizer-${{ matrix.target }}.tar.gz

  release:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.tar.gz
          generate_release_notes: true
